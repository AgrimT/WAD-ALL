<!DOCTYPE html>
<html>
<head>
    <title>Tourist Places of India</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        h1{
            background: orange;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .carousel{
            width: 700px;
            height: 400px;
            margin: 30px auto;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .slides{
            display: flex;
            width: 400%;
            animation: slide 16s infinite;
        }

        .slides img{
            width: 700px;
            height: 400px;
        }

        @keyframes slide{
            0% {margin-left: 0;}
            20% {margin-left: 0;}

            25% {margin-left: -700px;}
            45% {margin-left: -700px;}

            50% {margin-left: -1400px;}
            70% {margin-left: -1400px;}

            75% {margin-left: -2100px;}
            100% {margin-left: -2100px;}
        }

        .info{
            width: 70%;
            margin: auto;
            font-size: 20px;
        }

        p{
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px auto;
            width: 60%;
            box-shadow: 0px 0px 5px lightgray;
        }
    </style>
</head>

<body>

    <h1>Famous Tourist Places of India</h1>

    <div class="carousel">
        <div class="slides">

            <img src="images/taj.jpg">

            <img src="images/jaipur.jpg">

            <img src="images/indiagate.jpg">

            <img src="images/charminar.jpg">

        </div>
    </div>

    <div class="info">

        <p><b>1. Taj Mahal</b> - Located in Agra.</p>

        <p><b>2. Jaipur City</b> - Famous tourist destination of Rajasthan.</p>

        <p><b>3. India Gate</b> - Historic monument in New Delhi.</p>

        <p><b>4. Charminar</b> - Famous monument in Hyderabad.</p>

    </div>

</body>
</html>
